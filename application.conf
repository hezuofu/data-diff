# Data Diff Configuration (HOCON format)
# Author: lanxia39@163.com
# Supports: .conf, .json, .properties formats

# Left database
left {
  url: "jdbc:mysql://localhost:3306/database1"
  username: "root"
  password: "your_password"
  driver: "com.mysql.cj.jdbc.Driver"
  table: "users"
  primaryKey: ["id"]
  excludeColumns: ["updated_at", "created_at"]
  maxConnections: 10
}

# Right database
right {
  url: "jdbc:mysql://localhost:3306/database2"
  username: "root"
  password: "your_password"
  driver: "com.mysql.cj.jdbc.Driver"
  table: "users"
  primaryKey: ["id"]
  excludeColumns: ["updated_at", "created_at"]
  maxConnections: 10
}

# Comparison settings
comparison {
  algorithm: "hashdiff"    # hashdiff | joindiff | streamdiff

  # Algorithm tuning
  bisectionFactor: 32       # initial number of segments
  bisectionThreshold: 16384 # min rows before direct comparison
  threads: 4                # parallel worker threads

  # Data range (optional)
  # updateColumn: "updated_at"
  # whereClause: "status = 'active'"
  # minKey: 1
  # maxKey: 1000000

  # Comparison options
  numericTolerance: 0.001
  caseInsensitive: false

  # Custom comparator mappings (optional)
  customComparators {
    # status: "string"
    # amount: "numeric"
  }
}

# Output settings
output {
  format: "json"            # json | csv | table | stats
  outputFile: "diff-result.json"  # omit to print to stdout
  showStats: true
  maxRecords: 1000
}
