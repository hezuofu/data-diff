# Data Diff Configuration (HOCON format)
# Author: lanxia39@163.com
# Typesafe Config supports: .conf, .json, and .properties formats

# Left database configuration
left {
  url: "jdbc:mysql://localhost:3306/database1"
  username: "root"
  password: "your_password"
  driver: "com.mysql.cj.jdbc.Driver"
  table: "users"
  primaryKey: ["id"]
  excludeColumns: ["updated_at", "created_at"]
  maxConnections: 10
}

# Right database configuration  
right {
  url: "jdbc:mysql://localhost:3306/database2"
  username: "root"
  password: "your_password"
  driver: "com.mysql.cj.jdbc.Driver"
  table: "users"
  primaryKey: ["id"]
  excludeColumns: ["updated_at", "created_at"]
  maxConnections: 10
}

# Comparison settings
comparison {
  algorithm: "hashdiff"  # hashdiff or joindiff
  # New parameter names (preferred)
  bisectionFactor: 32
  bisectionThreshold: 16384
  threads: 4
  # Backward-compatible keys (also supported)
  segmentSize: 50000
  parallelism: 4
  maxBisectionDepth: 10
  # Data range (optional)
  # updateColumn: "updated_at"
  # whereClause: "status = 'active'"
  numericTolerance: 0.001
  caseInsensitive: false
  
  # Custom comparator mappings (optional)
  customComparators {
    # status: "string"
    # amount: "numeric"
  }
}

# Output settings
output {
  format: "json"  # json, csv, table, or stats
  outputFile: "diff-result.json"  # Optional, prints to console if not specified
  showStats: true
  maxRecords: 1000
}
